<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text { font-family: Inter, sans-serif; fill: #E5E7EB; }
    .title { font-size: 40px; font-weight: 700; }
    .sub { font-size: 16px; fill: #06B6D4; letter-spacing: 3px; }
  </style>

  <!-- Cluster icon -->
  <circle cx="80" cy="100" r="20" fill="#06B6D4"></circle>
  <circle cx="40" cy="140" r="10" fill="#1E3A8A"></circle>
  <circle cx="120" cy="140" r="10" fill="#1E3A8A"></circle>
  <circle cx="80" cy="50" r="10" fill="#1E3A8A"></circle>

  <line x1="80" y1="100" x2="40" y2="140" stroke="#06B6D4" stroke-width="2"></line>
  <line x1="80" y1="100" x2="120" y2="140" stroke="#06B6D4" stroke-width="2"></line>
  <line x1="80" y1="100" x2="80" y2="50" stroke="#06B6D4" stroke-width="2"></line>

  <!-- Text -->
  <text x="160" y="105" class="text title">OVERCLOCK</text>
  <text x="160" y="135" class="text sub">ENTERPRISE</text>
</svg>